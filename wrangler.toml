name = "your-worker-name"
main = "src/index.js"
compatibility_date = "2024-12-02"

# Public template only. Keep local values in wrangler.local.toml.
[vars]
WORKER_VAR_NAME = "replace-in-local-or-cloudflare"

# KV Namespace binding for storing bookmarks
[[kv_namespaces]]
binding = "STORAGE_KV"
id = "replace-with-kv-namespace-id"
preview_id = "replace-with-kv-preview-id"

[[d1_databases]]
binding = "datastoraged01"
database_name = "replace-with-d1-database-name"
database_id = "replace-with-d1-database-id"
