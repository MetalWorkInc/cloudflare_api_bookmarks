#wrangler.base.toml
name = "statics"
main = "src/index.js"
compatibility_date = "2024-12-02"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# Public template only. Keep local values in wrangler.local.toml.
[vars]
WORKER_VAR_X = "replace-with-secret-or-build-var"

# KV Namespace binding for storing bookmarks
[[kv_namespaces]]
binding = "replace_binding_kv_name"
id = "replace-with-kv-namespace-id"
preview_id = "replace-with-kv-preview-id"

[[d1_databases]]
binding = "replace_binding_storage_name"
database_name = "replace_storage_name"
database_id = "replace-with-d1-database-id"
